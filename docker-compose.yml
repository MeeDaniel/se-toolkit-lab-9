version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tourstats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-tourstats_db}
    # NOTE: Port 5432 is NOT exposed externally. Only accessible within Docker network.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tourstats}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hackathon-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tourstats:changeme_password_123@db:5432/tourstats_db}
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      NANOBOT_WS_URL: ${NANOBOT_WS_URL:-ws://nanobot:8000/ws}
      BACKEND_SECRET: ${BACKEND_SECRET:-changeme_backend_secret_123}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-tourstats-backend}
    # NOTE: Port 8000 is NOT exposed externally. Accessible via Caddy reverse proxy.
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hackathon-network

  # Nanobot AI Agent
  nanobot:
    build:
      context: ./nanobot
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MISTRAL_BASE_URL: ${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      NANOBOT_ACCESS_KEY: ${NANOBOT_ACCESS_KEY:-changeme_nanobot_key_123}
      NANOBOT_SYSTEM_PROMPT: ${NANOBOT_SYSTEM_PROMPT:-You are a helpful assistant for Innopolis tour guides.}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      MCP_CONFIG_PATH: /app/mcp
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-tourstats-nanobot}
    # NOTE: Port 8000 (internal) is NOT exposed externally. Accessible via Caddy reverse proxy.
    networks:
      - hackathon-network

  # React Web Client (Production Build via Nginx)
  client:
    build:
      context: ./client-web-react
      dockerfile: Dockerfile
    environment:
      REACT_APP_WS_URL: ${REACT_APP_WS_URL:-ws://localhost/ws}
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost/api}
      REACT_APP_NANOBOT_ACCESS_KEY: ${NANOBOT_ACCESS_KEY:-changeme_nanobot_key_123}
    # NOTE: Port 3000 is NOT exposed externally. Accessible via Caddy reverse proxy.
    depends_on:
      - backend
      - nanobot
    networks:
      - hackathon-network

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      NANOBOT_ACCESS_KEY: ${NANOBOT_ACCESS_KEY:-changeme_nanobot_key_123}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - client
      - nanobot
    networks:
      - hackathon-network

  # OpenTelemetry Collector (Optional - internal only)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector/otel-collector.yaml:/etc/otel-collector.yaml:ro
    # NOTE: Ports 4317/4318 are NOT exposed externally. Internal telemetry only.
    networks:
      - hackathon-network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  hackathon-network:
    driver: bridge
